<!DOCTYPE html>
<html>
<head>
    <title>Transitive Inference Spatial Association Experiment</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        /* Custom styles for shapes */
        .shape-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            gap: 100px;
        }
        
        .shape {
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        
        .square {
            width: 150px;
            height: 150px;
        }
        
        .hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        
        .triangle {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        
        .heart {
            position: relative;
            width: 150px;
            height: 135px;
        }
        
        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 75px;
            height: 120px;
            border-radius: 75px 75px 0 0;
        }
        
        .heart::before {
            left: 75px;
        }
        
        .heart::after {
            left: 0;
        }
        
        .arrow {
            font-size: 120px;
            color: white;
        }
        
        .feedback-correct {
            color: green;
            font-size: 36px;
            font-weight: bold;
        }
        
        .feedback-incorrect {
            color: red;
            font-size: 36px;
            font-weight: bold;
        }
        
        .fixation {
            font-size: 48px;
            color: white;
        }
        
        .instruction-text {
            font-size: 20px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }
        
        .block-feedback {
            font-size: 24px;
            line-height: 1.8;
        }

        /* Add background color */
        body {
            background-color: #808080;
        }

        .jspsych-content {
            max-width: 95%;
        }
    </style>
</head>
<body></body>
<script src="experiment.js"></script>
</html>
